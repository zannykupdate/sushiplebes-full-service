<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cocina - SUSHI LOSPLEBES</title>
    <style>
        :root {
            --bg-color: #F9F9F9;
            --text-color: #111111;
            --border-color: #111111;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2vw;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: -1px;
            font-weight: 900;
        }

        .status-badge {
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #FFFFFF;
            border: 3px solid var(--border-color);
            box-shadow: 6px 6px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            background: #EFEFEF;
            border-bottom: 3px solid var(--border-color);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .pago-badge {
            background: #FFFFFF;
            border: 2px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .delivery-method {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            padding: 1rem;
            border: 3px dashed var(--border-color);
            background-color: #FAFAFA;
            letter-spacing: 1px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            color: #666;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .orden-detalle {
            background-color: #FFFCDF; /* Ligero tono amarillo para simular nota */
            border-left: 5px solid #FFD700;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 500;
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.4;
        }

        /* Iframe oculto para inyección de impresión térmica */
        #printFrame {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Monitor Cocina | Comandas</h1>
        <div class="status-badge" id="statusIndicator">🟢 EN LÍNEA (SSE)</div>
    </div>

    <div class="grid" id="pedidosContainer">
        <!-- Las tarjetas se inyectarán aquí dinámicamente -->
    </div>

    <!-- Módulo de Automatización de Tícket Térmico -->
    <iframe id="printFrame"></iframe>

    <script>
        // ==========================================
        // 1. LÓGICA DE FORMATO DE TICKET (32 CARACTERES ESC/POS)
        // ==========================================
        const formatTicket = (pedido) => {
            const padRight = (str, len) => str.length >= len ? str.substring(0,len) : str + ' '.repeat(len - str.length);
            const padLeft = (str, len) => str.length >= len ? str.substring(0,len) : ' '.repeat(len - str.length) + str;
            const center = (str, len) => {
                if (str.length >= len) return str.substring(0, len);
                const left = Math.floor((len - str.length) / 2);
                const right = len - str.length - left;
                return ' '.repeat(left) + str + ' '.repeat(right);
            };

            let ticket = "\n";
            ticket += center("SUSHI LOSPLEBES", 32) + "\n";
            ticket += center("RFC: SPL190101XYZ", 32) + "\n";
            ticket += center("Ticket de Comanda/Venta", 32) + "\n";
            ticket += "-".repeat(32) + "\n";
            ticket += padRight("Orden ID: " + pedido.id, 32) + "\n";
            ticket += padRight("Cliente: " + pedido.nombre, 32) + "\n";
            ticket += padRight("Tel: " + pedido.telefono, 32) + "\n";
            
            const isPickup = typeof pedido.direccion_entrega === "string" && pedido.direccion_entrega.toUpperCase().includes("PICKUP");
            ticket += "-".repeat(32) + "\n";
            ticket += center(isPickup ? "** PICKUP **" : "** DELIVERY **", 32) + "\n";
            ticket += "-".repeat(32) + "\n";
            
            ticket += padRight("Detalles del pedido:", 32) + "\n";
            
            let detalles = pedido.detalles_orden || "";
            // Separar en líneas de max 32 chars sin cortar palabras bruscamente si es posible
            for(let i=0; i<detalles.length; i+=32) {
                ticket += padRight(detalles.substring(i, i+32), 32) + "\n";
            }

            ticket += "-".repeat(32) + "\n";
            ticket += padRight("Total:", 15) + padLeft("$" + parseFloat(pedido.total || 0).toFixed(2), 17) + "\n";
            ticket += padRight("Pago Ref:", 15) + padLeft(pedido.metodo_pago || "Efectivo", 17) + "\n";
            
            if (!isPickup) {
                ticket += "-".repeat(32) + "\n";
                ticket += center("DIRECCION DE ENTREGA", 32) + "\n";
                let dir = pedido.direccion_entrega || "";
                for(let i=0; i<dir.length; i+=32) {
                    ticket += padRight(dir.substring(i, i+32), 32) + "\n";
                }
            }

            ticket += "=".repeat(32) + "\n";
            ticket += center("IVA INCLUIDO", 32) + "\n";
            ticket += center("QUEJAS PROFECO: 800 468 8722", 32) + "\n";
            ticket += center("¡GRACIAS POR TU COMPRA!", 32) + "\n";
            ticket += "\n\n\n\n";

            return ticket;
        };

        // ==========================================
        // 2. DISPARADOR SILENCIOSO DE IMPRESIÓN 
        // ==========================================
        const printTicket = (pedido) => {
            const ticketText = formatTicket(pedido);
            const iframe = document.getElementById('printFrame');
            const doc = iframe.contentWindow.document;
            
            doc.open();
            // Inyectar CSS puro para forzar ancho de 58mm y tipografía monospaciada en el frame impreso
            doc.write('<html><head><style>');
            doc.write('@page { margin: 0; }');
            doc.write('body { margin: 0; font-family: "Courier New", Courier, monospace; font-size: 13px; font-weight: bold; white-space: pre-wrap; width: 58mm; overflow: hidden; color: #000; background: #fff; line-height: 1.2; }');
            doc.write('</style></head><body>');
            doc.write(ticketText.replace(/</g, "&lt;").replace(/>/g, "&gt;"));
            doc.write('</body></html>');
            doc.close();

            // Pequeño delay para asegurar renderizado del DOM en el iframe antes de disparar window.print
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }, 300);
        };

        // ==========================================
        // 3. RENDERIZADO VISUAL EN PANTALLA
        // ==========================================
        const renderCard = (pedido) => {
            const container = document.getElementById('pedidosContainer');
            const isPickup = (pedido.direccion_entrega || "").toUpperCase().includes('PICKUP');
            const isTransfer = (pedido.metodo_pago || "").toUpperCase().includes('TRANSFERENCIA');
            
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card-header">
                    <h2>#${pedido.id}</h2>
                    <span class="pago-badge">${isTransfer ? 'TRANSFERENCIA' : 'EFECTIVO'}</span>
                </div>
                <div class="card-body">
                    <div class="delivery-method">
                        ${isPickup ? '🚶‍♂️ PICKUP' : '🛵 DELIVERY'}
                    </div>

                    <div class="info-row">
                        <span class="label">Cliente / Contacto</span>
                        <span class="value">${pedido.nombre} (${pedido.telefono})</span>
                    </div>

                    <div class="info-row">
                        <span class="label">Detalles del Pedido</span>
                        <div class="orden-detalle">${pedido.detalles_orden}</div>
                    </div>

                    ${!isPickup ? `
                    <div class="info-row">
                        <span class="label">Dirección de Entrega</span>
                        <span class="value">${pedido.direccion_entrega}</span>
                    </div>` : ''}

                    <div class="info-row">
                        <span class="label">Referencias y Total</span>
                        <span class="value">$${parseFloat(pedido.total || 0).toFixed(2)} — ${pedido.metodo_pago}</span>
                    </div>
                </div>
            `;
            
            // Insertamos al principio para que las órdenes nuevas empujen a las viejas hacia abajo
            container.insertBefore(card, container.firstChild);
        };

        // ==========================================
        // 4. CONEXIÓN SSE EN TIEMPO REAL
        // ==========================================
        const initSSE = () => {
            const evtSource = new EventSource("/monitor/stream");
            const indicator = document.getElementById('statusIndicator');

            evtSource.onmessage = function(event) {
                try {
                    const pedido = JSON.parse(event.data);
                    renderCard(pedido);
                    printTicket(pedido);
                } catch (err) {
                    console.error("Error parseando SSE json: ", err);
                }
            };

            evtSource.onopen = function() {
                indicator.innerText = "🟢 EN LÍNEA (SSE)";
                indicator.style.backgroundColor = "#111";
            };

            evtSource.onerror = function() {
                indicator.innerText = "🔴 DESCONECTADO - RECONECTANDO...";
                indicator.style.backgroundColor = "#d32f2f";
            };
        };

        // Iniciar al cargar
        window.onload = initSSE;
    </script>
</body>
</html>
