<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cocina - SUSHI LOSPLEBES</title>
    <style>
        :root {
            --bg-color: #F9F9F9;
            --text-color: #111111;
            --border-color: #111111;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2vw;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: -1px;
            font-weight: 900;
        }

        .status-badge {
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #FFFFFF;
            border: 3px solid var(--border-color);
            box-shadow: 6px 6px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            background: #EFEFEF;
            border-bottom: 3px solid var(--border-color);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .pago-badge {
            background: #FFFFFF;
            border: 2px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .delivery-method {
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            padding: 1rem;
            border: 3px dashed var(--border-color);
            background-color: #FAFAFA;
            letter-spacing: 1px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            color: #666;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .orden-detalle {
            background-color: #FFFCDF; /* Ligero tono amarillo para simular nota */
            border-left: 5px solid #FFD700;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 500;
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.4;
        }

        /* Iframe oculto para inyección de impresión térmica */
        #printFrame {
            display: none;
        }

        .btn-connect {
            background-color: #ffd700;
            border: 3px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.1s ease;
        }

        .btn-connect:active {
            box-shadow: 0px 0px 0px var(--border-color);
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Monitor Cocina | Comandas</h1>
        <div style="display: flex; gap: 1rem; align-items: center; justify-content: flex-end; flex-wrap: wrap;">
            <button class="btn-connect" id="btnConnectSerial" onclick="connectSerialPrinter()">🔌 COM Serial</button>
            <button class="btn-connect" id="btnConnectUSB" onclick="connectUSBPrinter()" style="background-color: #2b5797;">🔌 Direct USB</button>
            <button class="btn-connect" id="btnPrintTest" onclick="printTest()" style="background-color: #e65100;">🧾 Test Impresión</button>
            <div class="status-badge" id="statusIndicator">🟢 EN LÍNEA (SSE)</div>
        </div>
    </div>

    <div class="grid" id="pedidosContainer">
        <!-- Las tarjetas se inyectarán aquí dinámicamente -->
    </div>

    <!-- Módulo de Automatización de Tícket Térmico (Fallback) -->
    <iframe id="printFrame"></iframe>

    <script>
        // ==========================================
        // 0. CONEXIÓN WEB SERIAL ESC/POS
        // ==========================================
        let printerWriter = null;
        let usbPrinterDevice = null;
        let usbPrinterEndpoint = null;

        async function connectSerialPrinter() {
            try {
                if (!navigator.serial) {
                    alert("Tu navegador no soporta Web Serial API. Usa Google Chrome o Edge.");
                    return;
                }
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                printerWriter = port.writable.getWriter();
                
                const btn = document.getElementById('btnConnectSerial');
                btn.innerText = "🖨️ SERIAL CONECTADA";
                btn.style.backgroundColor = "#2e7d32";
                btn.style.color = "white";
            } catch (err) {
                console.error("Error conectando a la impresora serie:", err);
                alert("Error COM Serial: " + err.message);
            }
        }

        async function connectUSBPrinter() {
            try {
                if (!navigator.usb) {
                    alert("Tu navegador no soporta WebUSB. Usa Google Chrome o Edge.");
                    return;
                }
                // Filtramos por cualquier dispositivo
                usbPrinterDevice = await navigator.usb.requestDevice({ filters: [] });
                await usbPrinterDevice.open();
                
                if (usbPrinterDevice.configuration === null) {
                    await usbPrinterDevice.selectConfiguration(1);
                }
                await usbPrinterDevice.claimInterface(0);

                let endpointNum = null;
                for (const endpoint of usbPrinterDevice.configuration.interfaces[0].alternate.endpoints) {
                    if (endpoint.direction === "out" && endpoint.type === "bulk") {
                        endpointNum = endpoint.endpointNumber;
                        break;
                    }
                }

                if (!endpointNum) {
                    throw new Error("No se encontró Endpoint Bulk de escritura en este dispositivo USB.");
                }
                
                usbPrinterEndpoint = endpointNum;

                const btn = document.getElementById('btnConnectUSB');
                btn.innerText = "🖨️ USB CONECTADO";
                btn.style.backgroundColor = "#2e7d32";
                btn.style.color = "white";
            } catch (err) {
                console.error("Error conectando USB:", err);
                alert("Error Direct USB: " + err.message + "\n\nNota: Si ya instalaste los drivers, Windows los bloquea. Debes usar WinUSB (Zadig) o desinstalar el driver genérico en administrados de dispositivos de Windows para que WebUSB funcione.");
            }
        }

        const printTest = async () => {
            const pedidoFake = {
                id: 999,
                nombre: "Usuario de Prueba",
                telefono: "555-555-5555",
                detalles_orden: "1x TICKET DE PRUEBA",
                direccion_entrega: "PICKUP",
                total: "0.00",
                metodo_pago: "Ninguno"
            };
            await printTicket(pedidoFake);
        };

        const normalizeText = (text) => {
            if (!text) return "";
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        };

        // ==========================================
        // 1. RAW ESC/POS BYTES (32 CARACTERES - 58MM)
        // ==========================================
        const generateEscPosData = (pedido) => {
            const encoder = new TextEncoder();
            const buffers = [];

            const writeCmd = (cmdArray) => buffers.push(new Uint8Array(cmdArray));
            const writeText = (text) => buffers.push(encoder.encode(normalizeText(text)));

            const INIT = [0x1b, 0x40];
            const ALIGN_CENTER = [0x1b, 0x61, 0x01];
            const ALIGN_LEFT = [0x1b, 0x61, 0x00];
            const BOLD_ON = [0x1b, 0x45, 0x01];
            const BOLD_OFF = [0x1b, 0x45, 0x00];
            const CUT = [0x1d, 0x56, 0x41, 0x03];

            const isPickup = typeof pedido.direccion_entrega === "string" && pedido.direccion_entrega.toUpperCase().includes("PICKUP");

            const padRight = (str, len) => str.length >= len ? str.substring(0,len) : str + ' '.repeat(len - str.length);
            const padLeft = (str, len) => str.length >= len ? str.substring(0,len) : ' '.repeat(len - str.length) + str;

            writeCmd(INIT);
            writeCmd(ALIGN_CENTER);
            writeCmd(BOLD_ON);
            writeText("SUSHI LOSPLEBES\n");
            writeCmd(BOLD_OFF);
            writeText("RFC: SPL190101XYZ\nTicket de Comanda\n");
            writeText("-".repeat(32) + "\n");
            
            writeCmd(ALIGN_LEFT);
            writeText(padRight("Orden ID: " + pedido.id, 32) + "\n");
            writeText(padRight("Cliente: " + pedido.nombre, 32) + "\n");
            writeText(padRight("Tel: " + pedido.telefono, 32) + "\n");
            
            writeCmd(ALIGN_CENTER);
            writeCmd(BOLD_ON);
            writeText("-".repeat(32) + "\n");
            writeText(isPickup ? "** PICKUP **\n" : "** DELIVERY **\n");
            writeText("-".repeat(32) + "\n");
            writeCmd(BOLD_OFF);

            writeCmd(ALIGN_LEFT);
            writeText("Detalles del pedido:\n");
            let detalles = normalizeText(pedido.detalles_orden || "");
            for(let i=0; i<detalles.length; i+=32) {
                writeText(padRight(detalles.substring(i, i+32), 32) + "\n");
            }

            writeText("-".repeat(32) + "\n");
            writeCmd(BOLD_ON);
            writeText(padRight("Total:", 15) + padLeft("$" + parseFloat(pedido.total || 0).toFixed(2), 17) + "\n");
            writeCmd(BOLD_OFF);
            writeText(padRight("Pago Ref:", 15) + padLeft(pedido.metodo_pago || "Efectivo", 17) + "\n");

            if (!isPickup) {
                writeText("-".repeat(32) + "\n");
                writeCmd(ALIGN_CENTER);
                writeCmd(BOLD_ON);
                writeText("DIRECCION DE ENTREGA\n");
                writeCmd(BOLD_OFF);
                
                let dir = normalizeText(pedido.direccion_entrega || "");
                for(let i=0; i<dir.length; i+=32) {
                    writeText(padRight(dir.substring(i, i+32), 32) + "\n");
                }
            }

            writeText("=".repeat(32) + "\n");
            writeCmd(ALIGN_CENTER);
            writeText("IVA INCLUIDO\nQUEJAS PROFECO: 800 468 8722\nGRACIAS POR TU COMPRA\n\n\n\n\n");
            writeCmd(CUT);

            return buffers;
        };

        // ==========================================
        // 2. DISPARADOR DE IMPRESIÓN (RAW o FALLBACK IFRAME)
        // ==========================================
        const printTicket = async (pedido) => {
            if (printerWriter) {
                try {
                    const buffers = generateEscPosData(pedido);
                    for (const buffer of buffers) {
                        await printerWriter.write(buffer);
                    }
                    console.log("Impreso via RAW ESC/POS Serial.");
                    return;
                } catch (err) {
                    console.error("Error enviando RAW ESC/POS Serial:", err);
                }
            } else if (usbPrinterDevice && usbPrinterEndpoint) {
                try {
                    const buffers = generateEscPosData(pedido);
                    for (const buffer of buffers) {
                        await usbPrinterDevice.transferOut(usbPrinterEndpoint, buffer);
                    }
                    console.log("Impreso via RAW ESC/POS Direct USB.");
                    return;
                } catch (err) {
                    console.error("Error enviando RAW ESC/POS Direct USB:", err);
                }
            }
            
            // IFRAME FALLBACK
            const formatTicketIframe = (ped) => {
                const padR = (str, len) => str.length >= len ? str.substring(0,len) : str + ' '.repeat(len - str.length);
                const padL = (str, len) => str.length >= len ? str.substring(0,len) : ' '.repeat(len - str.length) + str;
                const center = (str, len) => {
                    if (str.length >= len) return str.substring(0, len);
                    const left = Math.floor((len - str.length) / 2);
                    return ' '.repeat(left) + str + ' '.repeat(len - str.length - left);
                };

                let ticket = "\n";
                ticket += center("SUSHI LOSPLEBES", 32) + "\n";
                ticket += center("RFC: SPL190101XYZ", 32) + "\n";
                ticket += center("Ticket de Comanda/Venta", 32) + "\n";
                ticket += "-".repeat(32) + "\n";
                ticket += padR("Orden ID: " + ped.id, 32) + "\n";
                ticket += padR("Cliente: " + ped.nombre, 32) + "\n";
                ticket += padR("Tel: " + ped.telefono, 32) + "\n";
                
                const pick = typeof ped.direccion_entrega === "string" && ped.direccion_entrega.toUpperCase().includes("PICKUP");
                ticket += "-".repeat(32) + "\n";
                ticket += center(pick ? "** PICKUP **" : "** DELIVERY **", 32) + "\n";
                ticket += "-".repeat(32) + "\n";
                
                ticket += padR("Detalles del pedido:", 32) + "\n";
                let dtls = normalizeText(ped.detalles_orden || "");
                for(let i=0; i<dtls.length; i+=32) { ticket += padR(dtls.substring(i, i+32), 32) + "\n"; }

                ticket += "-".repeat(32) + "\n";
                ticket += padR("Total:", 15) + padL("$" + parseFloat(ped.total || 0).toFixed(2), 17) + "\n";
                ticket += padR("Pago Ref:", 15) + padL(ped.metodo_pago || "Efectivo", 17) + "\n";
                
                if (!pick) {
                    ticket += "-".repeat(32) + "\n";
                    ticket += center("DIRECCION DE ENTREGA", 32) + "\n";
                    let dir = normalizeText(ped.direccion_entrega || "");
                    for(let i=0; i<dir.length; i+=32) { ticket += padR(dir.substring(i, i+32), 32) + "\n"; }
                }

                ticket += "=".repeat(32) + "\n";
                ticket += center("IVA INCLUIDO", 32) + "\n";
                ticket += center("QUEJAS PROFECO: 800 468 8722", 32) + "\n";
                ticket += center("¡GRACIAS POR TU COMPRA!", 32) + "\n\n\n\n";
                return ticket;
            };

            const ticketText = formatTicketIframe(pedido);
            const iframe = document.getElementById('printFrame');
            const doc = iframe.contentWindow.document;
            
            doc.open();
            // Inyectar CSS puro para forzar ancho de 58mm y tipografía monospaciada en el frame impreso
            doc.write('<html><head><style>');
            doc.write('@page { margin: 0; }');
            doc.write('body { margin: 0; font-family: "Courier New", Courier, monospace; font-size: 13px; font-weight: bold; white-space: pre-wrap; width: 58mm; overflow: hidden; color: #000; background: #fff; line-height: 1.2; }');
            doc.write('</style></head><body>');
            doc.write(ticketText.replace(/</g, "&lt;").replace(/>/g, "&gt;"));
            doc.write('</body></html>');
            doc.close();

            // Pequeño delay para asegurar renderizado del DOM en el iframe antes de disparar window.print
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }, 300);
        };

        // ==========================================
        // 3. RENDERIZADO VISUAL EN PANTALLA
        // ==========================================
        const renderCard = (pedido) => {
            const container = document.getElementById('pedidosContainer');
            const isPickup = (pedido.direccion_entrega || "").toUpperCase().includes('PICKUP');
            const isTransfer = (pedido.metodo_pago || "").toUpperCase().includes('TRANSFERENCIA');
            
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card-header">
                    <h2>#${pedido.id}</h2>
                    <span class="pago-badge">${isTransfer ? 'TRANSFERENCIA' : 'EFECTIVO'}</span>
                </div>
                <div class="card-body">
                    <div class="delivery-method">
                        ${isPickup ? '🚶‍♂️ PICKUP' : '🛵 DELIVERY'}
                    </div>

                    <div class="info-row">
                        <span class="label">Cliente / Contacto</span>
                        <span class="value">${pedido.nombre} (${pedido.telefono})</span>
                    </div>

                    <div class="info-row">
                        <span class="label">Detalles del Pedido</span>
                        <div class="orden-detalle">${pedido.detalles_orden}</div>
                    </div>

                    ${!isPickup ? `
                    <div class="info-row">
                        <span class="label">Dirección de Entrega</span>
                        <span class="value">${pedido.direccion_entrega}</span>
                    </div>` : ''}

                    <div class="info-row">
                        <span class="label">Referencias y Total</span>
                        <span class="value">$${parseFloat(pedido.total || 0).toFixed(2)} — ${pedido.metodo_pago}</span>
                    </div>
                </div>
            `;
            
            // Insertamos al principio para que las órdenes nuevas empujen a las viejas hacia abajo
            container.insertBefore(card, container.firstChild);
        };

        // ==========================================
        // 4. CONEXIÓN SSE EN TIEMPO REAL
        // ==========================================
        const initSSE = () => {
            const evtSource = new EventSource("/monitor/stream");
            const indicator = document.getElementById('statusIndicator');

            evtSource.onmessage = function(event) {
                try {
                    const pedido = JSON.parse(event.data);
                    renderCard(pedido);
                    printTicket(pedido);
                } catch (err) {
                    console.error("Error parseando SSE json: ", err);
                }
            };

            evtSource.onopen = function() {
                indicator.innerText = "🟢 EN LÍNEA (SSE)";
                indicator.style.backgroundColor = "#111";
            };

            evtSource.onerror = function() {
                indicator.innerText = "🔴 DESCONECTADO - RECONECTANDO...";
                indicator.style.backgroundColor = "#d32f2f";
            };
        };

        // Iniciar al cargar
        window.onload = initSSE;
    </script>
</body>
</html>
