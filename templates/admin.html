<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSHI LOSPLEBES | Panel Administrativo</title>
    <!-- Proveído bajo la regla estricta de no usar React/Webpack -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">
    <!-- Contenedor Maestro Responsivo (Mobile-First / Desktop Sidebar) -->
    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-gray-900 text-white flex flex-col flex-shrink-0 shadow-lg z-10">
            <div class="p-6 border-b border-gray-800">
                <h2 class="text-2xl font-black uppercase tracking-widest text-yellow-500">LOS PLEBES</h2>
                <p class="text-xs text-gray-400 font-semibold tracking-wider mt-1">SISTEMA POS ADMIN</p>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto">
                <a href="/admin" class="flex items-center gap-3 px-4 py-3 bg-gray-800 rounded-lg text-yellow-500 font-bold hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Resumen
                </a>
                <a href="/monitor" target="_blank" class="flex items-center gap-3 px-4 py-3 text-gray-300 rounded-lg font-semibold hover:bg-gray-800 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Monitor Cocina
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col p-6 md:p-10 max-h-screen overflow-y-auto">
            <!-- Header section -->
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b border-gray-200 pb-5">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 uppercase tracking-tight">Panel de Control</h1>
                    <p class="text-gray-500 font-medium mt-1">Métricas en tiempo real e inventario</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-sm font-bold text-gray-600 tracking-wide uppercase">Sistema Activo</span>
                </div>
            </header>

            <!-- Responsive Bento Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 flex-1">
                <!-- Tarjeta de Ingresos (Ocupa dos columnas en pantallas grandes) -->
                <section class="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Ingresos del Día</h3>
                        <p class="text-5xl font-black text-gray-900 tracking-tighter" id="totalGanancias">$0.00</p>
                    </div>
                </section>

                <!-- Tarjeta de Órdenes Pendientes -->
                <section class="bg-gray-900 rounded-2xl shadow border border-gray-900 p-8 flex flex-col justify-between text-white">
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Órdenes Pendientes</h3>
                        <p class="text-5xl font-black text-yellow-500 tracking-tighter" id="contadorOrdenes">0</p>
                    </div>
                    <div class="mt-8">
                        <a href="/monitor" target="_blank" class="block text-center bg-yellow-500 text-gray-900 font-bold py-3 px-4 rounded-xl hover:bg-yellow-400 transition">Atender en Monitor &rarr;</a>
                    </div>
                </section>

                <!-- Tabla de datos (Ocupa espacio completo debajo) -->
                <section class="xl:col-span-3 bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                    <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wider mb-6">Stock de Inventario (Básico)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-xs text-gray-500 uppercase tracking-wider border-b border-gray-100">
                                    <th class="py-3 px-4 font-semibold">Producto / Insumo</th>
                                    <th class="py-3 px-4 font-semibold">Cantidad Restante</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryList" class="text-sm font-medium divide-y divide-gray-100">
                                <!-- Datos inyectados via JS desde /api/inventory -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Script para alimentar la tabla de forma asíncrona -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Dashboard Data
            try {
                const resDash = await fetch('/api/dashboard');
                const dashData = await resDash.json();
                
                if (dashData) {
                    const formatCurrency = (val) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(val);
                    document.getElementById('totalGanancias').innerText = formatCurrency(dashData.total_ganancias || 0);
                    document.getElementById('contadorOrdenes').innerText = dashData.pending_orders || 0;
                }
            } catch (err) {
                console.error("Error cargando dashboard:", err);
            }

            // Inventory Data
            try {
                const res = await fetch('/api/inventory');
                const items = await res.json();
                const tbody = document.getElementById('inventoryList');
                if(items && items.length > 0) {
                    tbody.innerHTML = items.map(item => `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-4 font-bold text-gray-800">${item.item}</td>
                            <td class="py-4 px-4">
                                <span class="bg-${item.quantity > 5 ? 'green' : 'red'}-100 text-${item.quantity > 5 ? 'green' : 'red'}-800 px-3 py-1 rounded-full text-xs font-black border border-${item.quantity > 5 ? 'green' : 'red'}-200">
                                    ${item.quantity} Uds.
                                </span>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="2" class="py-4 px-4 text-gray-400 italic">No hay inventario registrado.</td></tr>';
                }
            } catch (err) {
                console.error("Error cargando inventario:", err);
            }
        });
    </script>
</body>
</html>
